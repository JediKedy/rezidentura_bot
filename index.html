<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezidentura Bot</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-white min-h-screen">

<div class="max-w-md mx-auto p-4 space-y-4">

    <!-- HEADER -->
    <div class="flex justify-between items-center">
        <h1 id="title" class="font-bold text-lg text-blue-600 truncate">Yüklənir...</h1>

        <button id="back-btn" onclick="goBack()" class="hidden p-2">
            ←
        </button>
    </div>

    <!-- SEARCH -->
    <div id="search-container">
        <input id="search-input" type="text" placeholder="Axtar..."
            class="w-full p-3 rounded-xl border dark:bg-slate-900">
    </div>

    <!-- STATS -->
    <div id="stats-bar" class="hidden flex justify-between text-sm">
        <div class="flex items-center gap-2">
            <span id="progress" class="px-2 py-1 bg-blue-100 text-blue-600 rounded text-xs">0/0</span>
            <button onclick="jumpToQuestion()" class="text-xs bg-slate-200 px-2 py-1 rounded">
                Keçid
            </button>
        </div>

        <div class="flex gap-3">
            <span class="text-green-500">✔ <span id="score-correct">0</span></span>
            <span class="text-red-500">✘ <span id="score-wrong">0</span></span>
        </div>
    </div>

    <!-- CONTENT -->
    <div id="content"></div>

</div>

<!-- JUMP MODAL -->
<div id="jump-modal"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center"
     onclick="closeJumpModal()">

    <div onclick="event.stopPropagation()"
         class="bg-white dark:bg-slate-900 p-6 rounded-2xl w-64 text-center relative">

        <!-- CLOSE -->
        <button onclick="closeJumpModal()" class="absolute top-2 right-2">
            ✕
        </button>

        <h3 class="font-bold mb-4">Suala keçid</h3>

        <input id="jump-input" type="number" placeholder="№"
            class="w-full p-3 text-center border rounded mb-4 dark:bg-slate-800">

        <button onclick="confirmJump()"
            class="w-full bg-blue-600 text-white p-3 rounded">
            Keç
        </button>
    </div>
</div>

<script src="script.js"></script>

<script>
const tg = window.Telegram.WebApp;

function initTheme() {
    if (tg.colorScheme === 'dark') {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
}

tg.onEvent('themeChanged', initTheme);
initTheme();

// ESC / ENTER
document.addEventListener('keydown', (e) => {
    const modal = document.getElementById('jump-modal');
    if (modal.classList.contains('hidden')) return;

    if (e.key === 'Escape') closeJumpModal();
    if (e.key === 'Enter') confirmJump();
});
</script>

</body>
</html>
