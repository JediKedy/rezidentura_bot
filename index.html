<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz App | Pro</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Səhv daxil edildikdə titrəmə animasiyası */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }

        /* Hamar keçid üçün bəzi düzəlişlər */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class', // Telegram mövzusuna uyğun 'class' istifadə edəcəyik
            theme: { 
                extend: { 
                    colors: { 
                        brand: { light: '#3b82f6', dark: '#60a5fa' } 
                    } 
                } 
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen transition-colors duration-300 antialiased">

<div class="max-w-md mx-auto px-4 py-6 mb-20">

    <header class="mb-6 flex flex-col gap-4">
        <div class="flex items-center justify-between min-h-[40px]">
            <h1 id="title" class="text-xl font-black tracking-tight text-blue-600 dark:text-blue-400 uppercase truncate pr-4">
                Yüklənir...
            </h1>

            <button id="back-btn" onclick="goBack()"
                class="hidden p-2 rounded-full bg-slate-200/50 dark:bg-slate-800/50 hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </button>
        </div>

        <div id="search-container" class="relative group">
            <input type="text" id="search-input" placeholder="Bank və ya mövzu axtar..."
                class="w-full p-3.5 pl-11 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all text-sm shadow-sm">

            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                class="absolute left-4 top-4 w-4 h-4 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
        </div>

        <div id="stats-bar" class="hidden animate-in fade-in slide-in-from-top-2 duration-300">
            <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm">
                
                <div class="flex items-center gap-2">
                    <span id="progress" class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2.5 py-1 rounded-lg text-xs font-black">
                        0/0
                    </span>

                    <button onclick="jumpToQuestion()"
                        class="flex items-center gap-1.5 px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-lg hover:bg-blue-600 hover:text-white dark:hover:bg-blue-500 transition-all text-[11px] font-bold uppercase tracking-wider active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25L12 21m0 0l-3.75-3.75M12 21V3" />
                        </svg>
                        Keçid
                    </button>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></span>
                        <span id="score-correct" class="text-sm font-bold text-green-600 dark:text-green-500">0</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]"></span>
                        <span id="score-wrong" class="text-sm font-bold text-red-600 dark:text-red-500">0</span>
                    </div>
                </div>

            </div>
        </div>
    </header>

    <main id="content" class="space-y-3">
        <div class="animate-pulse space-y-3">
            <div class="h-16 bg-slate-200 dark:bg-slate-800 rounded-xl w-full"></div>
            <div class="h-16 bg-slate-200 dark:bg-slate-800 rounded-xl w-full"></div>
            <div class="h-16 bg-slate-200 dark:bg-slate-800 rounded-xl w-full"></div>
        </div>
    </main>
</div>

<div id="jump-modal"
     class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/40 backdrop-blur-md animate-in fade-in duration-200"
     onclick="closeJumpModal()">

    <div onclick="event.stopPropagation()"
         class="relative bg-white dark:bg-slate-900 w-full max-w-[280px] rounded-[2.5rem] p-8 shadow-2xl border border-slate-200 dark:border-slate-800 transform animate-in zoom-in duration-300">

        <button onclick="closeJumpModal()"
            class="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>

        <div class="text-center">
            <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 8.25L12 15l6.75-6.75" />
                </svg>
            </div>
            
            <h3 class="text-xl font-black mb-1">Suala keçid</h3>
            <p id="jump-modal-desc" class="text-[11px] uppercase tracking-widest font-bold text-slate-400 mb-6">
                Limit: 0 - 0
            </p>

            <input type="number" id="jump-input" inputmode="numeric" placeholder="00"
                class="w-full p-4 mb-6 text-center text-4xl font-black rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">

            <div class="flex gap-3">
                <button onclick="confirmJump()"
                    class="w-full py-4 font-black text-white bg-blue-600 hover:bg-blue-700 rounded-2xl shadow-lg shadow-blue-500/40 active:scale-95 transition-all uppercase text-xs tracking-widest">
                    Təsdiqlə
                </button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

<script>
    // Telegram Mövzusunu Tətbiq Et
    const initTheme = () => {
        if (tg.colorScheme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    };
    tg.onEvent('themeChanged', initTheme);
    initTheme();

    // ESC və ENTER düymələri üçün listener
    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('jump-modal');
        if (modal.classList.contains('hidden')) return;

        if (e.key === 'Escape') closeJumpModal();
        if (e.key === 'Enter') confirmJump();
    });
</script>

</body>
</html>
